# P0-1 — Rust CI: fmt, clippy, test on Linux + Windows + macOS.
# Toolchain pinned via rust-toolchain.toml at the repo root.
#
# P5-1 — adds contracts jobs:
#   - contracts-build: forge build (deny-warnings); enforces solc 0.8.24 + Shanghai EVM
#   - contracts-test: forge test (unit + invariant; >=10k invariant runs)
#   - contracts-abi-drift: re-build and diff out/ABI vs committed contracts/abi/RevisionLogV0.json
#   - contracts-slither: static analysis; zero high-severity findings required
#
# MVP-2 issue 2.1 — extends the jobs above to cover RevisionLogV1 alongside
# v0. Per docs/issue-plans/2.1.md §6: same deploy-script dry-run, same
# ABI-drift diff, same slither scan; v0 jobs are unchanged.
#
# MVP-2 issue 2.2 — extends the jobs above to cover EntitlementRegistry
# alongside v0 + v1. Per docs/issue-plans/2.2.md §6: same deploy-script
# dry-run (with dummy authority env vars), same ABI-drift diff, same
# slither scan; v0 + v1 jobs are unchanged.

name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # CI hotfix (2026-05-13): bump prefix to bust stale v0 caches
          # that poisoned the test job on macos-latest (a cached
          # `~/.cargo/bin/cargo` mis-aligned with the post-image-roll
          # rustup state caused `cargo build` to dispatch to
          # `rustup-init` with an "unexpected argument 'build'" error).
          # `cache-bin: "false"` keeps Swatinem from caching the cargo
          # bin dir — that path is managed by `dtolnay/rust-toolchain@stable`
          # and should not be touched by the cache layer.
          prefix-key: "v1"
          cache-bin: "false"
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1"
          cache-bin: "false"
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace --all-targets

  # -----------------------------------------------------------------
  # P5-1: contracts pipeline
  # -----------------------------------------------------------------

  contracts-build:
    name: contracts / forge build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          # Pinned to match the version Kelvin runs locally (forge
          # 1.0.0-stable). Floating `stable` kept trapping us on Foundry
          # CLI changes (e.g. `--no-commit` removed in 1.7.x; new
          # `unsafe-typecast` linter introduced in 1.7.x). The invariant
          # is: CI uses the same forge as local dev. Bump in lockstep.
          version: v1.0.0
      # forge-std is vendored at contracts/lib/forge-std (v1.16.1) so no
      # `forge install` step is needed here — the working-directory checkout
      # already contains it. See `.gitignore` exception line.
      - name: forge build (deny warnings, sizes)
        run: forge build --deny-warnings --sizes
      - name: forge fmt --check
        run: forge fmt --check
      # Audit gap-7: dry-run the deploy script so a regression in the
      # script (bad import, missing constructor arg, vm.startBroadcast
      # misuse, etc.) is caught at build time. We invoke it without
      # --rpc-url / --broadcast / --private-key so it executes against
      # a local in-memory EVM and never tries to send a transaction;
      # `vm.startBroadcast()` with no broadcaster signed-up is a no-op.
      - name: forge script (deploy dry-run)
        run: forge script script/DeployRevisionLogV0.s.sol --sig "run()" --tc DeployRevisionLogV0
      # MVP-2 issue 2.1: same dry-run for v1. Same audit-gap-7 rationale
      # as v0 — catches a regression in the script (bad import, missing
      # constructor arg, vm.startBroadcast misuse) at build time.
      - name: forge script (deploy v1 dry-run)
        run: forge script script/DeployRevisionLogV1.s.sol --sig "run()" --tc DeployRevisionLogV1
      # MVP-2 issue 2.2: same dry-run for the EntitlementRegistry.
      # Dummy authority addresses passed via env so the constructor's
      # `address(0)` zero-authority guard does not trip; the deploy
      # script reads both via vm.envAddress. Per docs/issue-plans/2.2.md
      # L11, the actual testnet deploy is issue 2.3 — this step only
      # gates that the script + constructor compile and dry-run cleanly.
      - name: forge script (deploy entitlement-registry dry-run)
        env:
          PAYMENT_AUTHORITY: "0x0000000000000000000000000000000000000001"
          REDEMPTION_AUTHORITY: "0x0000000000000000000000000000000000000002"
        run: forge script script/DeployEntitlementRegistry.s.sol --sig "run()" --tc DeployEntitlementRegistry
      # MVP-2 issue 2.3: smoke-test the deploy-wrapper script
      # (scripts/deploy-contracts.sh) in dry-run mode against the dev
      # environment. Catches regressions in the wrapper itself — flag
      # parsing, env-file sourcing, forge invocation — without touching
      # chain state. --dry-run skips the chain-id + balance checks
      # because the dev env's RPC URL (127.0.0.1:8545) has no anvil
      # listening in CI, and --unattended is safe because dry-run never
      # prompts for a keystore passphrase. The wrapper lives at the repo
      # root so we override this job's `working-directory: contracts`
      # default for this step only.
      - name: deploy-wrapper dry-run (scripts/deploy-contracts.sh smoke test)
        working-directory: ${{ github.workspace }}
        env:
          BASESCAN_API_KEY: ""
        run: bash scripts/deploy-contracts.sh --env dev --contract all --dry-run --unattended

  contracts-test:
    name: contracts / forge test (incl. invariants)
    runs-on: ubuntu-latest
    needs: contracts-build
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          # Pinned to match the version Kelvin runs locally (forge
          # 1.0.0-stable). Floating `stable` kept trapping us on Foundry
          # CLI changes (e.g. `--no-commit` removed in 1.7.x; new
          # `unsafe-typecast` linter introduced in 1.7.x). The invariant
          # is: CI uses the same forge as local dev. Bump in lockstep.
          version: v1.0.0
      # forge-std is vendored at contracts/lib/forge-std (v1.16.1) so no
      # `forge install` step is needed here — the working-directory checkout
      # already contains it. See `.gitignore` exception line.
      # Per docs/issue-plans/P5-1.md success criterion #3 the invariant
      # tests must run with at least 10,000 fuzzed runs. The default in
      # foundry.toml is already 10000; this env var is a belt-and-braces
      # guarantee in case foundry.toml is edited.
      - name: forge test (unit + invariant >= 10k runs)
        env:
          FOUNDRY_INVARIANT_RUNS: "10000"
        run: forge test -vv

  contracts-abi-drift:
    name: contracts / ABI drift check
    runs-on: ubuntu-latest
    needs: contracts-build
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          # Pinned to match the version Kelvin runs locally (forge
          # 1.0.0-stable). Floating `stable` kept trapping us on Foundry
          # CLI changes (e.g. `--no-commit` removed in 1.7.x; new
          # `unsafe-typecast` linter introduced in 1.7.x). The invariant
          # is: CI uses the same forge as local dev. Bump in lockstep.
          version: v1.0.0
      # forge-std is vendored at contracts/lib/forge-std (v1.16.1) so no
      # `forge install` step is needed here — the working-directory checkout
      # already contains it. See `.gitignore` exception line.
      # Re-build the contract from source and compare its ABI against
      # the committed JSON. Any drift = compilation reproducibility
      # failure or stale ABI commit.
      - name: forge build
        run: forge build
      - name: Extract freshly built ABI (v0)
        # Match the committed file's POSIX trailing-newline convention so
        # diff does not flag a spurious end-of-file mismatch.
        run: |
          python3 -c "import json; d=json.load(open('out/RevisionLogV0.sol/RevisionLogV0.json')); f=open('/tmp/RevisionLogV0.fresh.json','w'); json.dump(d['abi'], f, indent=2); f.write('\n'); f.close()"
      - name: Diff committed v0 ABI against fresh ABI
        run: |
          if ! diff -u abi/RevisionLogV0.json /tmp/RevisionLogV0.fresh.json; then
            echo "::error::ABI drift detected between contracts/abi/RevisionLogV0.json and forge build output."
            echo "::error::Re-run: cd contracts && forge build && python3 -c \"import json; d=json.load(open('out/RevisionLogV0.sol/RevisionLogV0.json')); f=open('abi/RevisionLogV0.json','w'); json.dump(d['abi'], f, indent=2); f.write('\n'); f.close()\""
            exit 1
          fi
      # MVP-2 issue 2.1: same ABI-drift discipline for v1.
      - name: Extract freshly built ABI (v1)
        run: |
          python3 -c "import json; d=json.load(open('out/RevisionLogV1.sol/RevisionLogV1.json')); f=open('/tmp/RevisionLogV1.fresh.json','w'); json.dump(d['abi'], f, indent=2); f.write('\n'); f.close()"
      - name: Diff committed v1 ABI against fresh ABI
        run: |
          if ! diff -u abi/RevisionLogV1.json /tmp/RevisionLogV1.fresh.json; then
            echo "::error::ABI drift detected between contracts/abi/RevisionLogV1.json and forge build output."
            echo "::error::Re-run: cd contracts && forge build && python3 -c \"import json; d=json.load(open('out/RevisionLogV1.sol/RevisionLogV1.json')); f=open('abi/RevisionLogV1.json','w'); json.dump(d['abi'], f, indent=2); f.write('\n'); f.close()\""
            exit 1
          fi
      # MVP-2 issue 2.2: same ABI-drift discipline for the entitlement
      # registry.
      - name: Extract freshly built ABI (entitlement-registry)
        run: |
          python3 -c "import json; d=json.load(open('out/EntitlementRegistry.sol/EntitlementRegistry.json')); f=open('/tmp/EntitlementRegistry.fresh.json','w'); json.dump(d['abi'], f, indent=2); f.write('\n'); f.close()"
      - name: Diff committed entitlement-registry ABI against fresh ABI
        run: |
          if ! diff -u abi/EntitlementRegistry.json /tmp/EntitlementRegistry.fresh.json; then
            echo "::error::ABI drift detected between contracts/abi/EntitlementRegistry.json and forge build output."
            echo "::error::Re-run: cd contracts && forge build && python3 -c \"import json; d=json.load(open('out/EntitlementRegistry.sol/EntitlementRegistry.json')); f=open('abi/EntitlementRegistry.json','w'); json.dump(d['abi'], f, indent=2); f.write('\n'); f.close()\""
            exit 1
          fi

  contracts-slither:
    name: contracts / slither
    runs-on: ubuntu-latest
    needs: contracts-build
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          # Pinned to match the version Kelvin runs locally (forge
          # 1.0.0-stable). Floating `stable` kept trapping us on Foundry
          # CLI changes (e.g. `--no-commit` removed in 1.7.x; new
          # `unsafe-typecast` linter introduced in 1.7.x). The invariant
          # is: CI uses the same forge as local dev. Bump in lockstep.
          version: v1.0.0
      # forge-std is vendored at contracts/lib/forge-std (v1.16.1) so no
      # `forge install` step is needed here — the working-directory checkout
      # already contains it. See `.gitignore` exception line.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install slither + pinned solc
        run: |
          pip install slither-analyzer
          solc-select install 0.8.24
          solc-select use 0.8.24
      # Plan success criterion #4: zero high-severity findings.
      # `--fail-high` exits non-zero on any High-severity issue.
      # We do NOT exclude lower severities by default; informational and
      # low-severity findings are tolerated but visible in CI logs so a
      # reviewer can decide whether to address them.
      - name: slither (v0)
        run: slither src/RevisionLogV0.sol --fail-high
      # MVP-2 issue 2.1: same slither posture for v1. Zero high-severity
      # findings required per docs/issue-plans/2.1.md success criterion.
      - name: slither (v1)
        run: slither src/RevisionLogV1.sol --fail-high
      # MVP-2 issue 2.2: same slither posture for the entitlement
      # registry. Zero high-severity findings required per
      # docs/issue-plans/2.2.md success criterion.
      - name: slither (entitlement-registry)
        run: slither src/EntitlementRegistry.sol --fail-high

  # -----------------------------------------------------------------
  # P1-6: Rust supply-chain hardening
  # -----------------------------------------------------------------

  # Fails the build on RUSTSEC advisories against any crate in
  # Cargo.lock (which is now committed for this binary-producing
  # workspace).
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1"
          cache-bin: "false"
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo audit
        # The two ignored advisories are alloy 2.x transitives flagged
        # `unmaintained` (NOT vulnerabilities). They are also allow-listed
        # in `deny.toml` for `cargo deny check`. Remove the ignore flags
        # as soon as alloy bumps past these transitives.
        # See `cargo audit --help` for `--ignore` semantics.
        run: cargo audit --deny warnings --ignore RUSTSEC-2024-0388 --ignore RUSTSEC-2024-0436

  # Dependency policy. Enforces the crypto-crate allowlist + serde ban
  # and license / source / advisory rules defined in deny.toml.
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1"
          cache-bin: "false"
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      - name: Run cargo deny
        run: cargo deny check advisories bans licenses sources

  # -----------------------------------------------------------------
  # MVP-1 issue 1.1 — invariant guards + FFI bindings smoke
  # -----------------------------------------------------------------

  # HIGH-1 (`pangolin-crypto` zero-serde) + Q3 (`pangolin-core`
  # zero-uniffi) invariants. Both must hold on every PR; both are also
  # enforced by deny.toml's bans table for serde, but the cargo-tree
  # check is a stricter belt-and-braces guarantee that catches indirect
  # paths a future `bans.deny` change might miss.
  #
  # MVP-2 issue 3.2 (L7) — extended with the pangolin-chain → pangolin-store
  # one-way-dep invariant. The production tree (`--edges normal` filters
  # dev-deps) must contain ZERO references to `pangolin-store`. The
  # existing dev-dep on `pangolin-store/test-utilities` is filtered out
  # by `--edges normal` so it does NOT false-positive.
  invariants:
    name: invariants (no-serde-in-crypto + no-uniffi-in-core + chain-no-store)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1"
          cache-bin: "false"
      - name: Verify pangolin-crypto has zero serde references
        run: bash scripts/check-no-serde-in-crypto.sh
      - name: Verify pangolin-core has zero uniffi references
        run: bash scripts/check-no-uniffi-in-core.sh
      # MVP-2 issue 3.2 (L7): the locked workspace dep direction is
      # `pangolin-store → pangolin-chain` (one-way). `pangolin-chain` MUST
      # NOT gain a non-dev `pangolin-store` dep. We use `--edges normal`
      # so the existing dev-dep on `pangolin-store/test-utilities` (used
      # by base_sepolia's integration tests) is filtered out and does
      # not false-positive. The `|| true` after `grep -c` avoids
      # `grep -c 0` exiting 1; the `[ "$l7" = "0" ]` is the real gate.
      - name: Cross-cutting invariants (HIGH-1 + Q3 + L7)
        run: |
          set -euxo pipefail
          high1=$(cargo tree -p pangolin-crypto | grep -ci serde)
          [ "$high1" = "0" ] || { echo "::error::HIGH-1 violated: pangolin-crypto serde count = $high1"; exit 1; }
          q3=$(cargo tree -p pangolin-core | grep -ci uniffi)
          [ "$q3" = "0" ] || { echo "::error::Q3 violated: pangolin-core uniffi count = $q3"; exit 1; }
          l7=$(cargo tree -p pangolin-chain --no-default-features --edges normal | grep -c pangolin-store || true)
          [ "$l7" = "0" ] || { echo "::error::L7 violated: pangolin-chain production tree reaches pangolin-store ($l7 edges)"; exit 1; }

  # MVP-1 issue 1.1 §Test plan: `ffi-bindings` job. Builds the FFI
  # crate, asserts `staticlib`/`cdylib` artefacts exist, runs
  # `uniffi-bindgen` for Swift+Kotlin emission, runs `cbindgen` for
  # `pangolin.h` emission, runs `cc -fsyntax-only` on the emitted
  # header. 3-OS matrix so artefact production is verified everywhere
  # the master plan's downstream consumers (Tauri / iOS / Android)
  # care about.
  ffi-bindings:
    name: ffi-bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1"
          cache-bin: "false"

      - name: Build pangolin-ffi (cdylib + staticlib)
        run: cargo build -p pangolin-ffi

      # Verify the cdylib + staticlib + rlib artefacts exist. Filenames
      # differ across OSes: Linux ships `lib<name>.so`, macOS
      # `lib<name>.dylib`, Windows `<name>.dll`. The staticlib is
      # `lib<name>.a` on Linux/macOS, `<name>.lib` on Windows. We just
      # glob for any matching pattern.
      - name: Verify FFI artefacts exist (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          ls -la target/debug/libpangolin_ffi.so
          ls -la target/debug/libpangolin_ffi.a
      - name: Verify FFI artefacts exist (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          ls -la target/debug/libpangolin_ffi.dylib
          ls -la target/debug/libpangolin_ffi.a
      - name: Verify FFI artefacts exist (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if (-not (Test-Path target/debug/pangolin_ffi.dll)) { throw "missing pangolin_ffi.dll" }
          if (-not (Test-Path target/debug/pangolin_ffi.lib)) { throw "missing pangolin_ffi.lib (staticlib)" }

      # uniffi-bindgen emits Swift on macOS + Kotlin on Linux. The
      # foreign-language compile step (swiftc on macOS, kotlinc on
      # Linux) is a parser smoke test only — we don't link against the
      # FFI artefact. Windows runs the bindgen but skips the foreign-
      # language compile (no swiftc/kotlinc by default; the artefact
      # production is what we care about).
      - name: Generate Swift bindings (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cargo run -p pangolin-ffi --bin uniffi-bindgen --features uniffi-cli -- \
            generate \
            --library target/debug/libpangolin_ffi.dylib \
            --language swift \
            --out-dir target/ffi-bindings/swift \
            --no-format
          test -s target/ffi-bindings/swift/pangolin_ffi.swift
      - name: Swift parse smoke (macOS)
        if: matrix.os == 'macos-latest'
        run: swiftc -typecheck target/ffi-bindings/swift/pangolin_ffi.swift -import-objc-header target/ffi-bindings/swift/pangolin_ffiFFI.h
        continue-on-error: true   # swiftc smoke only; not a hard gate at MVP-1.

      - name: Generate Kotlin bindings (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo run -p pangolin-ffi --bin uniffi-bindgen --features uniffi-cli -- \
            generate \
            --library target/debug/libpangolin_ffi.so \
            --language kotlin \
            --out-dir target/ffi-bindings/kotlin \
            --no-format
          test -s target/ffi-bindings/kotlin/uniffi/pangolin_ffi/pangolin_ffi.kt

      # cbindgen emits the C header on every OS — the resulting
      # `pangolin.h` is OS-independent.
      - name: Generate C header via cbindgen
        run: cargo run -p pangolin-ffi --bin cbindgen-build --features cbindgen-cli

      - name: cc -fsyntax-only on emitted header (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cc -fsyntax-only target/ffi-bindings/c/pangolin.h
      - name: cc -fsyntax-only on emitted header (macOS)
        if: matrix.os == 'macos-latest'
        run: cc -fsyntax-only target/ffi-bindings/c/pangolin.h

      # Run the in-crate FFI smoke tests (roundtrip + error_taxonomy).
      - name: Run pangolin-ffi tests
        run: cargo test -p pangolin-ffi
