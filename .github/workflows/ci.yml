# P0-1 — Rust CI: fmt, clippy, test on Linux + Windows + macOS.
# Toolchain pinned via rust-toolchain.toml at the repo root.
#
# P5-1 — adds contracts jobs:
#   - contracts-build: forge build (deny-warnings); enforces solc 0.8.24 + Shanghai EVM
#   - contracts-test: forge test (unit + invariant; >=10k invariant runs)
#   - contracts-abi-drift: re-build and diff out/ABI vs committed contracts/abi/RevisionLogV0.json
#   - contracts-slither: static analysis; zero high-severity findings required
#
# MVP-2 issue 2.1 — extends the jobs above to cover RevisionLogV1 alongside
# v0. Per docs/issue-plans/2.1.md §6: same deploy-script dry-run, same
# ABI-drift diff, same slither scan; v0 jobs are unchanged.
#
# MVP-2 issue 2.2 — extends the jobs above to cover EntitlementRegistry
# alongside v0 + v1. Per docs/issue-plans/2.2.md §6: same deploy-script
# dry-run (with dummy authority env vars), same ABI-drift diff, same
# slither scan; v0 + v1 jobs are unchanged.

name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # CI hotfix (2026-05-13): bump prefix to bust stale v0 caches
          # that poisoned the test job on macos-latest (a cached
          # `~/.cargo/bin/cargo` mis-aligned with the post-image-roll
          # rustup state caused `cargo build` to dispatch to
          # `rustup-init` with an "unexpected argument 'build'" error).
          # `cache-bin: "false"` keeps Swatinem from caching the cargo
          # bin dir — that path is managed by `dtolnay/rust-toolchain@stable`
          # and should not be touched by the cache layer.
          prefix-key: "v1"
          cache-bin: "false"
      # `pangolin-desktop` is excluded because it pulls in Tauri's
      # transitive gtk-rs / glib-sys deps which need Linux system
      # packages (libwebkit2gtk-4.1-dev, libgtk-3-dev, etc.) to even
      # compile their build scripts. Those deps are installed only in
      # the dedicated `desktop` job below; bringing them into the
      # workspace clippy run would cascade-fail every Ubuntu CI run.
      - run: cargo clippy --workspace --exclude pangolin-desktop --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1"
          cache-bin: "false"
      # `pangolin-desktop` is excluded for the same reason as the
      # clippy job above — Tauri's gtk-rs transitives need Linux
      # system packages on Ubuntu and the Tauri proc-macro panics
      # at build time on macOS. The dedicated `desktop` job below
      # runs pangolin-desktop's build + tests with the right deps
      # installed.
      - run: cargo build --workspace --exclude pangolin-desktop --all-targets
      - run: cargo test --workspace --exclude pangolin-desktop --all-targets

  # -----------------------------------------------------------------
  # MVP-4-A: design-tokens up-to-date gate
  # -----------------------------------------------------------------
  #
  # Plan-LOCK: docs/issue-plans/mvp4-a-design-tokens.md §6 + success
  # criterion #3 — the dist files (`apps/design-tokens/dist/tokens.css`
  # + `apps/design-tokens/src/lib.rs`) MUST be byte-identical to what
  # `cargo run -p design-tokens-gen` produces from the committed
  # `tokens.json`. This job catches a designer editing the JSON
  # without re-running the generator. Mirrors the existing job pattern
  # (Swatinem cache, `prefix-key: "v1"`, `cache-bin: "false"`).
  design-tokens-up-to-date:
    name: design-tokens / up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1"
          cache-bin: "false"
      - name: Regenerate design-tokens dist artifacts
        run: cargo run -p design-tokens-gen
      # If the generator produced anything different from what's
      # committed, the dist files drifted from tokens.json — fail
      # CI with a clear message that points at the fix.
      - name: Assert dist files are up to date
        # `--quiet` is the documented git-diff equivalent of
        # `--exit-status` and is what we actually want here: silent
        # output, exit 1 on diff. `--exit-status` is documented but
        # genuinely rejected by git 2.54.0 in both Ubuntu's apt-git
        # and the Windows-MSYS git build (caught when the b70a259
        # CI failed with `error: invalid option: --exit-status` even
        # though there was no real content drift). `--quiet` works
        # everywhere git diff does.
        run: |
          if ! git diff --quiet apps/design-tokens/dist apps/design-tokens/src/lib.rs; then
            echo "::error::design-tokens dist artifacts are out of date."
            echo "::error::Re-run: cargo run -p design-tokens-gen && commit apps/design-tokens/dist + apps/design-tokens/src/lib.rs"
            git --no-pager diff apps/design-tokens/dist apps/design-tokens/src/lib.rs
            exit 1
          fi

  # -----------------------------------------------------------------
  # MVP-4-C: browser-extension scaffold (apps/extension/)
  # -----------------------------------------------------------------
  #
  # Plan-LOCK: docs/issue-plans/mvp4-c-extension-scaffold.md §1 +
  # success criteria §7. Runs pnpm install --frozen-lockfile + the four
  # script gates (typecheck/lint/test/build) + a manifest smoke parse
  # against the built dist/manifest.json. Node version pinned via the
  # extension's .nvmrc; pnpm cache keyed off the extension's lockfile.
  extension:
    name: extension / scaffold
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm 10 is the LTS that works cleanly on the .nvmrc-pinned
      # Node 20.18.0. pnpm 11.x switched some internals to
      # node:builtin modules that don't exist in Node 20.18 (CI
      # failure on b70a259 was `ERR_UNKNOWN_BUILTIN_MODULE` from
      # pnpm 11.3.0). The `onlyBuiltDependencies:` esbuild
      # approval in pnpm-workspace.yaml is the canonical pnpm 10+
      # mechanism + works fine here. Bump pnpm + Node in lockstep
      # in a future cycle (Node 22 LTS + pnpm 11).
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: 'apps/extension/.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'apps/extension/pnpm-lock.yaml'
      - name: pnpm install --frozen-lockfile
        working-directory: apps/extension
        run: pnpm install --frozen-lockfile
      - name: pnpm typecheck
        working-directory: apps/extension
        run: pnpm typecheck
      - name: pnpm lint
        working-directory: apps/extension
        run: pnpm lint
      - name: pnpm test
        working-directory: apps/extension
        run: pnpm test
      - name: pnpm build
        working-directory: apps/extension
        run: pnpm build
      - name: Manifest smoke parse (MV3 + service_worker present)
        working-directory: apps/extension
        run: node -e "const m=JSON.parse(require('fs').readFileSync('dist/manifest.json')); if(m.manifest_version!==3) throw new Error('manifest_version not 3'); if(!m.background?.service_worker) throw new Error('service_worker missing');"

  # -----------------------------------------------------------------
  # MVP-4-D: component library (React + TypeScript + Vite + Storybook)
  # -----------------------------------------------------------------
  #
  # Plan-LOCK: docs/issue-plans/mvp4-d-component-library.md §6 — runs
  # `pnpm install --frozen-lockfile`, `pnpm typecheck`, `pnpm lint`,
  # `pnpm test` (vitest + @testing-library/react incl. the
  # `axe.test.tsx` axe-core a11y gate that runs against every component;
  # see audit fix-pass 15e3425), `pnpm storybook:build` (catches broken
  # stories + the interactive Storybook addon-a11y), and `pnpm build`
  # (Vite library mode → ESM + CJS + .d.ts). Uses
  # `actions/setup-node@v4` with the .nvmrc + pnpm-lockfile cache key,
  # mirroring the shape of the existing Rust jobs.
  component-library:
    name: component-library
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/component-library
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: 'apps/component-library/.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'apps/component-library/pnpm-lock.yaml'
      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: TypeScript strict typecheck
        run: pnpm typecheck
      - name: ESLint
        run: pnpm lint
      - name: Vitest (unit + behavior + axe-core a11y gate)
        run: pnpm test
      - name: Storybook static build
        run: pnpm storybook:build
      - name: Vite library build (ESM + CJS + .d.ts)
        run: pnpm build

  # -----------------------------------------------------------------
  # MVP-4-B: desktop shell (Tauri v2 + React 19 + Vite 6 + Cargo)
  # -----------------------------------------------------------------
  #
  # Plan-LOCK: docs/issue-plans/mvp4-b-desktop-shell.md §1 + success
  # criteria §7. Pre-builds the component-library (file: dep target),
  # runs the four pnpm gates (typecheck / lint / test / build), then
  # verifies the Rust side compiles via `cargo build -p pangolin-desktop`.
  # Runs on `ubuntu-latest` only this slice (macOS + Windows production
  # builds at release time, not every PR).
  desktop:
    name: desktop / scaffold
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Tauri v2's Linux build needs webkit2gtk + glib-2.0 + gtk-3 +
      # soup-3.0 + libxdo (xdotool runtime) + librsvg2 + ayatana-
      # appindicator. Without these the `glib-sys` build script fails
      # at pkg-config time (caught when the b43f575 CI hit
      # "Package glib-2.0 was not found in the pkg-config search path").
      # Install BEFORE the Rust toolchain step so the cargo cache key
      # (Swatinem/rust-cache) doesn't restore a poisoned cache from a
      # run that lacked these libs.
      - name: "Install Tauri Linux system deps (apt)"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Same v1 prefix the other Rust jobs use (cache hits across the
          # workspace's overlapping dep tree).
          prefix-key: "v1"
          cache-bin: "false"
      # pnpm 10 LTS: same pinning rationale as the extension job
      # (Node 20.18 + pnpm 11 hit ERR_UNKNOWN_BUILTIN_MODULE).
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: 'apps/desktop/.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'apps/desktop/pnpm-lock.yaml'
      # Pre-build the component-library — apps/desktop's package.json
      # uses a `file:../component-library` dep, so the `dist/` it
      # imports must exist BEFORE `pnpm install --frozen-lockfile`
      # runs in apps/desktop. Plan §6 fifth bullet.
      - name: "Pre-build component-library (file: dep target)"
        working-directory: apps/component-library
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: Install desktop deps (frozen lockfile)
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile
      - name: TypeScript strict typecheck
        working-directory: apps/desktop
        run: pnpm typecheck
      - name: ESLint
        working-directory: apps/desktop
        run: pnpm lint
      - name: Vitest (invoke wrappers + screen RTL)
        working-directory: apps/desktop
        run: pnpm test
      - name: Vite build
        working-directory: apps/desktop
        run: pnpm build
      # Rust-side build verification. The full workspace test job
      # already runs `cargo test --workspace` so the Rust side's unit
      # tests are covered there; this step pins that pangolin-desktop
      # builds cleanly with its Tauri + tauri-plugin-clipboard-manager
      # deps wired up.
      - name: Build pangolin-desktop (Rust side)
        run: cargo build -p pangolin-desktop

  # -----------------------------------------------------------------
  # P5-1: contracts pipeline
  # -----------------------------------------------------------------

  contracts-build:
    name: contracts / forge build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          # Pinned to match the version Kelvin runs locally (forge
          # 1.0.0-stable). Floating `stable` kept trapping us on Foundry
          # CLI changes (e.g. `--no-commit` removed in 1.7.x; new
          # `unsafe-typecast` linter introduced in 1.7.x). The invariant
          # is: CI uses the same forge as local dev. Bump in lockstep.
          version: v1.0.0
      # forge-std is vendored at contracts/lib/forge-std (v1.16.1) so no
      # `forge install` step is needed here — the working-directory checkout
      # already contains it. See `.gitignore` exception line.
      - name: forge build (deny warnings, sizes)
        run: forge build --deny-warnings --sizes
      - name: forge fmt --check
        run: forge fmt --check
      # Audit gap-7: dry-run the deploy script so a regression in the
      # script (bad import, missing constructor arg, vm.startBroadcast
      # misuse, etc.) is caught at build time. We invoke it without
      # --rpc-url / --broadcast / --private-key so it executes against
      # a local in-memory EVM and never tries to send a transaction;
      # `vm.startBroadcast()` with no broadcaster signed-up is a no-op.
      - name: forge script (deploy dry-run)
        run: forge script script/DeployRevisionLogV0.s.sol --sig "run()" --tc DeployRevisionLogV0
      # MVP-2 issue 2.1: same dry-run for v1. Same audit-gap-7 rationale
      # as v0 — catches a regression in the script (bad import, missing
      # constructor arg, vm.startBroadcast misuse) at build time.
      - name: forge script (deploy v1 dry-run)
        run: forge script script/DeployRevisionLogV1.s.sol --sig "run()" --tc DeployRevisionLogV1
      # MVP-2 issue 2.2: same dry-run for the EntitlementRegistry.
      # Dummy authority addresses passed via env so the constructor's
      # `address(0)` zero-authority guard does not trip; the deploy
      # script reads both via vm.envAddress. Per docs/issue-plans/2.2.md
      # L11, the actual testnet deploy is issue 2.3 — this step only
      # gates that the script + constructor compile and dry-run cleanly.
      - name: forge script (deploy entitlement-registry dry-run)
        env:
          PAYMENT_AUTHORITY: "0x0000000000000000000000000000000000000001"
          REDEMPTION_AUTHORITY: "0x0000000000000000000000000000000000000002"
        run: forge script script/DeployEntitlementRegistry.s.sol --sig "run()" --tc DeployEntitlementRegistry
      # MVP-3 issue #102: same dry-run for RecoveryV1. Same audit-gap-7
      # rationale — catches a regression in the script (bad import,
      # vm.startBroadcast misuse) at build time. RecoveryV1 has NO
      # constructor args (no signer authorities), so no env vars are
      # needed. Per docs/issue-plans/102-recovery-v1-contract.md L14 the
      # testnet deploy is a follow-on + mainnet is external-audit-gated
      # (D-011); this step only gates that the script compiles + dry-runs.
      - name: forge script (deploy recovery-v1 dry-run)
        run: forge script script/DeployRecoveryV1.s.sol --sig "run()" --tc DeployRecoveryV1
      # MVP-3 issue #106a: same dry-run for RevisionLogV2. Same audit-gap-7
      # rationale. RevisionLogV2 takes ONE constructor arg (the RecoveryV1
      # cross-read address, Q-h); with RECOVERY_V1_ADDRESS unset the deploy
      # script deploys a fresh RecoveryV1 in the same broadcast and wires V2
      # to it, so the two-contract construction path is exercised without
      # needing a pre-deployed address. Per
      # docs/issue-plans/106a-revisionlogv2-contract.md L18 the testnet
      # deploy is a follow-on + mainnet is external-audit-gated (D-011).
      - name: forge script (deploy revision-log-v2 dry-run)
        run: forge script script/DeployRevisionLogV2.s.sol --sig "run()" --tc DeployRevisionLogV2
      # MVP-2 issue 2.3: smoke-test the deploy-wrapper script
      # (scripts/deploy-contracts.sh) in dry-run mode against the dev
      # environment. Catches regressions in the wrapper itself — flag
      # parsing, env-file sourcing, forge invocation — without touching
      # chain state. --dry-run skips the chain-id + balance checks
      # because the dev env's RPC URL (127.0.0.1:8545) has no anvil
      # listening in CI, and --unattended is safe because dry-run never
      # prompts for a keystore passphrase. The wrapper lives at the repo
      # root so we override this job's `working-directory: contracts`
      # default for this step only.
      - name: deploy-wrapper dry-run (scripts/deploy-contracts.sh smoke test)
        working-directory: ${{ github.workspace }}
        env:
          BASESCAN_API_KEY: ""
        run: bash scripts/deploy-contracts.sh --env dev --contract all --dry-run --unattended

  contracts-test:
    name: contracts / forge test (incl. invariants)
    runs-on: ubuntu-latest
    needs: contracts-build
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          # Pinned to match the version Kelvin runs locally (forge
          # 1.0.0-stable). Floating `stable` kept trapping us on Foundry
          # CLI changes (e.g. `--no-commit` removed in 1.7.x; new
          # `unsafe-typecast` linter introduced in 1.7.x). The invariant
          # is: CI uses the same forge as local dev. Bump in lockstep.
          version: v1.0.0
      # forge-std is vendored at contracts/lib/forge-std (v1.16.1) so no
      # `forge install` step is needed here — the working-directory checkout
      # already contains it. See `.gitignore` exception line.
      # Per docs/issue-plans/P5-1.md success criterion #3 the invariant
      # tests must run with at least 10,000 fuzzed runs. The default in
      # foundry.toml is already 10000; this env var is a belt-and-braces
      # guarantee in case foundry.toml is edited.
      - name: forge test (unit + invariant >= 10k runs)
        env:
          FOUNDRY_INVARIANT_RUNS: "10000"
        run: forge test -vv

  # -----------------------------------------------------------------
  # Issue #101: anvil-fork CI harness. Boots a local anvil node,
  # deploys our REAL contract bytecode, generates dev.json, funds the
  # deterministic test wallet, and runs the 3 in-scope live tests
  # against it in dev mode — so the env-quirk #14 class (the 3.3
  # keccak(encPayload)-vs-preimage calldata bug, which passed hermetic
  # mocks) turns CI RED automatically. Purely additive (L3): existing
  # jobs untouched. Runs on every PR (R-c).
  # -----------------------------------------------------------------
  anvil-integration:
    name: anvil-fork integration (issue #101)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          # SAME pinned Foundry version as the contracts jobs (L4 /
          # env-quirk #4): CI uses the same anvil/forge/cast as local
          # dev. Bump in lockstep.
          version: v1.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1"
          cache-bin: "false"
      # The wrapper script owns all the orchestration (start anvil →
      # deploy → dev.json → fund → run tests → teardown). Per
      # env-quirk #16 we call the script, never long inline shell.
      - name: anvil harness (deploy + 3 in-scope tests in dev mode)
        run: bash scripts/anvil-ci.sh all

  contracts-abi-drift:
    name: contracts / ABI drift check
    runs-on: ubuntu-latest
    needs: contracts-build
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          # Pinned to match the version Kelvin runs locally (forge
          # 1.0.0-stable). Floating `stable` kept trapping us on Foundry
          # CLI changes (e.g. `--no-commit` removed in 1.7.x; new
          # `unsafe-typecast` linter introduced in 1.7.x). The invariant
          # is: CI uses the same forge as local dev. Bump in lockstep.
          version: v1.0.0
      # forge-std is vendored at contracts/lib/forge-std (v1.16.1) so no
      # `forge install` step is needed here — the working-directory checkout
      # already contains it. See `.gitignore` exception line.
      # Re-build the contract from source and compare its ABI against
      # the committed JSON. Any drift = compilation reproducibility
      # failure or stale ABI commit.
      - name: forge build
        run: forge build
      - name: Extract freshly built ABI (v0)
        # Match the committed file's POSIX trailing-newline convention so
        # diff does not flag a spurious end-of-file mismatch.
        run: |
          python3 -c "import json; d=json.load(open('out/RevisionLogV0.sol/RevisionLogV0.json')); f=open('/tmp/RevisionLogV0.fresh.json','w'); json.dump(d['abi'], f, indent=2); f.write('\n'); f.close()"
      - name: Diff committed v0 ABI against fresh ABI
        run: |
          if ! diff -u abi/RevisionLogV0.json /tmp/RevisionLogV0.fresh.json; then
            echo "::error::ABI drift detected between contracts/abi/RevisionLogV0.json and forge build output."
            echo "::error::Re-run: cd contracts && forge build && python3 -c \"import json; d=json.load(open('out/RevisionLogV0.sol/RevisionLogV0.json')); f=open('abi/RevisionLogV0.json','w'); json.dump(d['abi'], f, indent=2); f.write('\n'); f.close()\""
            exit 1
          fi
      # MVP-2 issue 2.1: same ABI-drift discipline for v1.
      - name: Extract freshly built ABI (v1)
        run: |
          python3 -c "import json; d=json.load(open('out/RevisionLogV1.sol/RevisionLogV1.json')); f=open('/tmp/RevisionLogV1.fresh.json','w'); json.dump(d['abi'], f, indent=2); f.write('\n'); f.close()"
      - name: Diff committed v1 ABI against fresh ABI
        run: |
          if ! diff -u abi/RevisionLogV1.json /tmp/RevisionLogV1.fresh.json; then
            echo "::error::ABI drift detected between contracts/abi/RevisionLogV1.json and forge build output."
            echo "::error::Re-run: cd contracts && forge build && python3 -c \"import json; d=json.load(open('out/RevisionLogV1.sol/RevisionLogV1.json')); f=open('abi/RevisionLogV1.json','w'); json.dump(d['abi'], f, indent=2); f.write('\n'); f.close()\""
            exit 1
          fi
      # MVP-2 issue 2.2: same ABI-drift discipline for the entitlement
      # registry.
      - name: Extract freshly built ABI (entitlement-registry)
        run: |
          python3 -c "import json; d=json.load(open('out/EntitlementRegistry.sol/EntitlementRegistry.json')); f=open('/tmp/EntitlementRegistry.fresh.json','w'); json.dump(d['abi'], f, indent=2); f.write('\n'); f.close()"
      - name: Diff committed entitlement-registry ABI against fresh ABI
        run: |
          if ! diff -u abi/EntitlementRegistry.json /tmp/EntitlementRegistry.fresh.json; then
            echo "::error::ABI drift detected between contracts/abi/EntitlementRegistry.json and forge build output."
            echo "::error::Re-run: cd contracts && forge build && python3 -c \"import json; d=json.load(open('out/EntitlementRegistry.sol/EntitlementRegistry.json')); f=open('abi/EntitlementRegistry.json','w'); json.dump(d['abi'], f, indent=2); f.write('\n'); f.close()\""
            exit 1
          fi
      # MVP-3 issue #102: same ABI-drift discipline for RecoveryV1.
      - name: Extract freshly built ABI (recovery-v1)
        run: |
          python3 -c "import json; d=json.load(open('out/RecoveryV1.sol/RecoveryV1.json')); f=open('/tmp/RecoveryV1.fresh.json','w'); json.dump(d['abi'], f, indent=2); f.write('\n'); f.close()"
      - name: Diff committed recovery-v1 ABI against fresh ABI
        run: |
          if ! diff -u abi/RecoveryV1.json /tmp/RecoveryV1.fresh.json; then
            echo "::error::ABI drift detected between contracts/abi/RecoveryV1.json and forge build output."
            echo "::error::Re-run: cd contracts && forge build && python3 -c \"import json; d=json.load(open('out/RecoveryV1.sol/RecoveryV1.json')); f=open('abi/RecoveryV1.json','w'); json.dump(d['abi'], f, indent=2); f.write('\n'); f.close()\""
            exit 1
          fi
      # MVP-3 issue #106a: same ABI-drift discipline for RevisionLogV2.
      - name: Extract freshly built ABI (revision-log-v2)
        run: |
          python3 -c "import json; d=json.load(open('out/RevisionLogV2.sol/RevisionLogV2.json')); f=open('/tmp/RevisionLogV2.fresh.json','w'); json.dump(d['abi'], f, indent=2); f.write('\n'); f.close()"
      - name: Diff committed revision-log-v2 ABI against fresh ABI
        run: |
          if ! diff -u abi/RevisionLogV2.json /tmp/RevisionLogV2.fresh.json; then
            echo "::error::ABI drift detected between contracts/abi/RevisionLogV2.json and forge build output."
            echo "::error::Re-run: cd contracts && forge build && python3 -c \"import json; d=json.load(open('out/RevisionLogV2.sol/RevisionLogV2.json')); f=open('abi/RevisionLogV2.json','w'); json.dump(d['abi'], f, indent=2); f.write('\n'); f.close()\""
            exit 1
          fi

  contracts-slither:
    name: contracts / slither
    runs-on: ubuntu-latest
    needs: contracts-build
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          # Pinned to match the version Kelvin runs locally (forge
          # 1.0.0-stable). Floating `stable` kept trapping us on Foundry
          # CLI changes (e.g. `--no-commit` removed in 1.7.x; new
          # `unsafe-typecast` linter introduced in 1.7.x). The invariant
          # is: CI uses the same forge as local dev. Bump in lockstep.
          version: v1.0.0
      # forge-std is vendored at contracts/lib/forge-std (v1.16.1) so no
      # `forge install` step is needed here — the working-directory checkout
      # already contains it. See `.gitignore` exception line.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install slither + pinned solc
        run: |
          pip install slither-analyzer
          solc-select install 0.8.24
          solc-select use 0.8.24
      # Plan success criterion #4: zero high-severity findings.
      # `--fail-high` exits non-zero on any High-severity issue.
      # We do NOT exclude lower severities by default; informational and
      # low-severity findings are tolerated but visible in CI logs so a
      # reviewer can decide whether to address them.
      - name: slither (v0)
        run: slither src/RevisionLogV0.sol --fail-high
      # MVP-2 issue 2.1: same slither posture for v1. Zero high-severity
      # findings required per docs/issue-plans/2.1.md success criterion.
      - name: slither (v1)
        run: slither src/RevisionLogV1.sol --fail-high
      # MVP-2 issue 2.2: same slither posture for the entitlement
      # registry. Zero high-severity findings required per
      # docs/issue-plans/2.2.md success criterion.
      - name: slither (entitlement-registry)
        run: slither src/EntitlementRegistry.sol --fail-high
      # MVP-3 issue #102: same slither posture for RecoveryV1. Zero
      # high-severity findings required per
      # docs/issue-plans/102-recovery-v1-contract.md (the highest-risk
      # EPIC; external-audit-gated before mainnet per D-011).
      - name: slither (recovery-v1)
        run: slither src/RecoveryV1.sol --fail-high
      # MVP-3 issue #106a: same slither posture for RevisionLogV2. Zero
      # high-severity findings required per
      # docs/issue-plans/106a-revisionlogv2-contract.md (same external-audit
      # tier as RecoveryV1 / RevisionLogV1; gated before mainnet by D-011).
      - name: slither (revision-log-v2)
        run: slither src/RevisionLogV2.sol --fail-high

  # -----------------------------------------------------------------
  # P1-6: Rust supply-chain hardening
  # -----------------------------------------------------------------

  # Fails the build on RUSTSEC advisories against any crate in
  # Cargo.lock (which is now committed for this binary-producing
  # workspace).
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1"
          cache-bin: "false"
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo audit
        # The two ignored advisories are alloy 2.x transitives flagged
        # `unmaintained` (NOT vulnerabilities). They are also allow-listed
        # in `deny.toml` for `cargo deny check`. Remove the ignore flags
        # as soon as alloy bumps past these transitives.
        # See `cargo audit --help` for `--ignore` semantics.
        # The three RUSTSEC-2024-04{12,13,16} ignores were added when
        # MVP-4-B's Tauri v2 deps brought in gtk-rs GTK3 bindings
        # (gtk3, gdk, glib transitives) which are unmaintained but
        # not vulnerable. Tauri itself is well-maintained; the gtk-rs
        # bindings stay until Tauri upgrades to gtk4 or libadwaita.
        run: cargo audit --deny warnings --ignore RUSTSEC-2024-0388 --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2024-0411 --ignore RUSTSEC-2024-0412 --ignore RUSTSEC-2024-0413 --ignore RUSTSEC-2024-0415 --ignore RUSTSEC-2024-0416 --ignore RUSTSEC-2024-0418 --ignore RUSTSEC-2024-0419 --ignore RUSTSEC-2024-0420 --ignore RUSTSEC-2024-0429

  # Dependency policy. Enforces the crypto-crate allowlist + serde ban
  # and license / source / advisory rules defined in deny.toml.
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1"
          cache-bin: "false"
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      - name: Run cargo deny
        run: cargo deny check advisories bans licenses sources

  # -----------------------------------------------------------------
  # MVP-1 issue 1.1 — invariant guards + FFI bindings smoke
  # -----------------------------------------------------------------

  # HIGH-1 (`pangolin-crypto` zero-serde) + Q3 (`pangolin-core`
  # zero-uniffi) invariants. Both must hold on every PR; both are also
  # enforced by deny.toml's bans table for serde, but the cargo-tree
  # check is a stricter belt-and-braces guarantee that catches indirect
  # paths a future `bans.deny` change might miss.
  #
  # MVP-2 issue 3.2 (L7) — extended with the pangolin-chain → pangolin-store
  # one-way-dep invariant. The production tree (`--edges normal` filters
  # dev-deps) must contain ZERO references to `pangolin-store`. The
  # existing dev-dep on `pangolin-store/test-utilities` is filtered out
  # by `--edges normal` so it does NOT false-positive.
  invariants:
    name: invariants (no-serde-in-crypto + no-uniffi-in-core + chain-no-store + no-ring)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1"
          cache-bin: "false"
      - name: Verify pangolin-crypto has zero serde references
        run: bash scripts/check-no-serde-in-crypto.sh
      - name: Verify pangolin-core has zero uniffi references
        run: bash scripts/check-no-uniffi-in-core.sh
      # MVP-2 issue 3.2 (L7): the locked workspace dep direction is
      # `pangolin-store → pangolin-chain` (one-way). `pangolin-chain` MUST
      # NOT gain a non-dev `pangolin-store` dep. Mirrors the
      # check-no-serde-in-crypto.sh / check-no-uniffi-in-core.sh pattern;
      # the script handles the `grep -c 0` exit-1 trap via `|| true`.
      - name: Verify pangolin-chain production tree has zero pangolin-store references
        run: bash scripts/check-chain-no-store.sh
      # MVP-2 issue #99 (L5 + L-ws-feature-leak-pulls-ring): the
      # workspace dep tree MUST NOT contain `ring`. The WS feature
      # flip selected `aws-lc-rs` via alloy 2.0.4's `transport-ws`
      # feature, but a future alloy/rustls/reqwest bump could
      # transitively re-route the TLS backend; this guard catches it
      # at PR time. `deny.toml`'s ring ban is the secondary defence;
      # this script is the cargo-tree first-line check.
      - name: Verify workspace tree has zero ring references
        run: bash scripts/check-no-ring.sh

  # MVP-1 issue 1.1 §Test plan: `ffi-bindings` job. Builds the FFI
  # crate, asserts `staticlib`/`cdylib` artefacts exist, runs
  # `uniffi-bindgen` for Swift+Kotlin emission, runs `cbindgen` for
  # `pangolin.h` emission, runs `cc -fsyntax-only` on the emitted
  # header. 3-OS matrix so artefact production is verified everywhere
  # the master plan's downstream consumers (Tauri / iOS / Android)
  # care about.
  ffi-bindings:
    name: ffi-bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1"
          cache-bin: "false"

      - name: Build pangolin-ffi (cdylib + staticlib)
        run: cargo build -p pangolin-ffi

      # Verify the cdylib + staticlib + rlib artefacts exist. Filenames
      # differ across OSes: Linux ships `lib<name>.so`, macOS
      # `lib<name>.dylib`, Windows `<name>.dll`. The staticlib is
      # `lib<name>.a` on Linux/macOS, `<name>.lib` on Windows. We just
      # glob for any matching pattern.
      - name: Verify FFI artefacts exist (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          ls -la target/debug/libpangolin_ffi.so
          ls -la target/debug/libpangolin_ffi.a
      - name: Verify FFI artefacts exist (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          ls -la target/debug/libpangolin_ffi.dylib
          ls -la target/debug/libpangolin_ffi.a
      - name: Verify FFI artefacts exist (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if (-not (Test-Path target/debug/pangolin_ffi.dll)) { throw "missing pangolin_ffi.dll" }
          if (-not (Test-Path target/debug/pangolin_ffi.lib)) { throw "missing pangolin_ffi.lib (staticlib)" }

      # uniffi-bindgen emits Swift on macOS + Kotlin on Linux. The
      # foreign-language compile step (swiftc on macOS, kotlinc on
      # Linux) is a parser smoke test only — we don't link against the
      # FFI artefact. Windows runs the bindgen but skips the foreign-
      # language compile (no swiftc/kotlinc by default; the artefact
      # production is what we care about).
      - name: Generate Swift bindings (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cargo run -p pangolin-ffi --bin uniffi-bindgen --features uniffi-cli -- \
            generate \
            --library target/debug/libpangolin_ffi.dylib \
            --language swift \
            --out-dir target/ffi-bindings/swift \
            --no-format
          test -s target/ffi-bindings/swift/pangolin_ffi.swift
      - name: Swift parse smoke (macOS)
        if: matrix.os == 'macos-latest'
        run: swiftc -typecheck target/ffi-bindings/swift/pangolin_ffi.swift -import-objc-header target/ffi-bindings/swift/pangolin_ffiFFI.h
        continue-on-error: true   # swiftc smoke only; not a hard gate at MVP-1.

      - name: Generate Kotlin bindings (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo run -p pangolin-ffi --bin uniffi-bindgen --features uniffi-cli -- \
            generate \
            --library target/debug/libpangolin_ffi.so \
            --language kotlin \
            --out-dir target/ffi-bindings/kotlin \
            --no-format
          test -s target/ffi-bindings/kotlin/uniffi/pangolin_ffi/pangolin_ffi.kt

      # cbindgen emits the C header on every OS — the resulting
      # `pangolin.h` is OS-independent.
      - name: Generate C header via cbindgen
        run: cargo run -p pangolin-ffi --bin cbindgen-build --features cbindgen-cli

      - name: cc -fsyntax-only on emitted header (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cc -fsyntax-only target/ffi-bindings/c/pangolin.h
      - name: cc -fsyntax-only on emitted header (macOS)
        if: matrix.os == 'macos-latest'
        run: cc -fsyntax-only target/ffi-bindings/c/pangolin.h

      # Run the in-crate FFI smoke tests (roundtrip + error_taxonomy).
      - name: Run pangolin-ffi tests
        run: cargo test -p pangolin-ffi
