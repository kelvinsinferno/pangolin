# cargo-deny configuration ‚Äî Pangolin workspace.
#
# Two roles:
#   1. Lock the set of crypto-bearing crates we ship to the audit
#      surface defined in `docs/issue-plans/P1.md`. The closed-world
#      enforcement is **the workspace `[workspace.dependencies]` block
#      with pinned `=X.Y.Z` versions plus the committed `Cargo.lock`**;
#      this file's `bans.deny` table is the secondary defense, listing
#      crypto-bearing crates that are NEVER allowed and would shadow
#      one of the locked primitives.
#   2. Fail the build on advisories (RUSTSEC), license incompatibility,
#      and unknown registries / git sources.
#
# Run locally with:
#   cargo install --locked cargo-deny
#   cargo deny check
#
# CI runs `cargo deny check advisories bans licenses sources` per
# `.github/workflows/ci.yml` (see the `deny` job).

[graph]
all-features = false

[advisories]
# RUSTSEC database advisories are hard failures.
version = 2
yanked = "deny"
ignore = [
    # `paste` (RUSTSEC-2024-0436) is flagged as unmaintained, not
    # vulnerable. It is reachable only as a transitive dependency of
    # `alloy-primitives` (used by `tools/chaincli/`); there is no
    # currently-published alloy release that drops the dependency. The
    # advisory does not describe an exploitable bug, only that the
    # upstream repo was archived. Removing this ignore is a follow-up
    # when alloy publishes a `paste`-free release; tracked at
    # https://github.com/alloy-rs/core (search "paste").
    { id = "RUSTSEC-2024-0436", reason = "Unmaintained (not vulnerable). Transitive of alloy-primitives via chaincli; no upstream replacement is available without a major alloy bump." },
    # P10 fix-pass L-1: `RUSTSEC-2024-0388` (`derivative` unmaintained)
    # ignore was REMOVED ‚Äî the alloy version bump that landed in P9
    # dropped `derivative` from the dep graph, so the ignore began
    # firing `advisory-not-detected` warnings and `cargo deny check`
    # was no longer fully clean. If a future alloy/coins churn
    # re-introduces the path, re-add the entry verbatim with a fresh
    # tracker URL.
    #
    # MVP-2 issue 3.5 status update: cargo-audit surfaces
    # RUSTSEC-2024-0388 again via the reqwest `=0.12.28` dep tree
    # (reqwest ‚Üí rustls-platform-verifier ‚Üí ark-ff ‚Üí derivative).
    # `cargo deny check advisories` STILL passes ("advisories ok")
    # because cargo-deny's default config flags only `vulnerability`
    # class, not `unmaintained`. We deliberately do NOT add an
    # ignore entry ‚Äî cargo-deny treats the absent advisory match
    # as `advisory-not-detected` (a warning), and the unmaintained
    # status is informational only. If a future cargo-deny upgrade
    # promotes `unmaintained` to a hard failure, the ignore entry
    # MUST be added back. Tracked at
    # https://github.com/EmbarkStudios/cargo-deny/issues (search
    # "unmaintained-as-hard-failure").
    #
    # MVP-4-B (2026-05-25): the Tauri v2 Linux build pulls in gtk-rs's
    # GTK3 bindings (gtk3, gdk, glib4-sys, etc.) which were marked
    # unmaintained on the rustsec advisory database when gtk-rs
    # moved focus to GTK4 / libadwaita. They are NOT vulnerable ‚Äî
    # only unmaintained. Tauri v2 still targets GTK3 on Linux; the
    # whole desktop ecosystem is in slow-cycle migration. Re-evaluate
    # when Tauri publishes a release that targets gtk4 / adwaita
    # primarily. The same three IDs are also `--ignore`d in the
    # cargo-audit CI job invocation.
    { id = "RUSTSEC-2024-0411", reason = "Unmaintained (not vulnerable). gtk-rs GTK3 binding family, transitive of Tauri v2 Linux build chain via pangolin-desktop. Tauri itself is well-maintained; the gtk-rs bindings will be replaced when Tauri upgrades to gtk4 / libadwaita." },
    { id = "RUSTSEC-2024-0412", reason = "Unmaintained (not vulnerable). gtk-rs GTK3 binding, same root as -0411." },
    { id = "RUSTSEC-2024-0413", reason = "Unmaintained (not vulnerable). gtk-rs GTK3 binding, same root as -0411." },
    { id = "RUSTSEC-2024-0415", reason = "Unmaintained (not vulnerable). gtk-rs GTK3 binding, same root as -0411." },
    { id = "RUSTSEC-2024-0416", reason = "Unmaintained (not vulnerable). gtk-rs GTK3 binding, same root as -0411." },
    { id = "RUSTSEC-2024-0418", reason = "Unmaintained (not vulnerable). gtk-rs GTK3 binding, same root as -0411." },
    { id = "RUSTSEC-2024-0419", reason = "Unmaintained (not vulnerable). gtk-rs GTK3 binding, same root as -0411." },
    { id = "RUSTSEC-2024-0420", reason = "Unmaintained (not vulnerable). gtk-rs GTK3 binding, same root as -0411." },
    { id = "RUSTSEC-2024-0429", reason = "Unmaintained (not vulnerable). gtk-rs GTK3 binding, same root as -0411." },
]

[licenses]
version = 2
# Permissive licenses we accept across the workspace dependency tree.
# Anything outside this list triggers a manual review per the plan.
# AGPL-3.0-or-later was added 2026-05-08 alongside the per-IP-spec
# relicense (D-016). It applies ONLY to first-party Pangolin crates;
# transitive dependencies are still expected to ship under permissive
# terms per the original allow-list.
allow = [
    "AGPL-3.0",
    "AGPL-3.0-or-later",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    # MVP-4-B (2026-05-25): Tauri v2's Linux build chain pulls in
    # crates that ship under the Boost Software License 1.0 (e.g.
    # `xmlparser`). BSL-1.0 is a permissive, attribution-not-
    # required, non-copyleft license ‚Äî semantically a superset of
    # MIT for permissiveness. It is well-known compatible with
    # AGPL distribution. Narrow attribution scoped to the Tauri
    # transitives that need it.
    "BSL-1.0",
    # `unicode-ident` ships under Unicode-DFS-2016 OR (Apache-2.0 WITH
    # LLVM-exception) ‚Äî covered above. No additional entries needed.
    #
    # P2: `rusqlite` with the `bundled` feature vendors SQLite, whose
    # public-domain dedication is expressed via the `Unlicense` SPDX
    # identifier in some distribution metadata. Allowing it here is
    # narrowly scoped to the bundled SQLite source ‚Äî we are not opening
    # the door to other Unlicense-bearing dependencies, since cargo-deny
    # still surfaces unexpected license surfaces in the dep graph.
    "Unlicense",
    # P6: `webpki-root-certs` (a transitive of `rustls-platform-verifier`
    # via `reqwest`, used by `tools/chaincli/` for HTTPS RPC) ships
    # under the Mozilla CA root-certificate Community Data License
    # Agreement (Permissive 2.0). The CDLA-Permissive-2.0 license is a
    # permissive, attribution-only license used specifically for
    # data-set distributions like CA root bundles; it does not impose
    # copyleft and is compatible with Apache-2.0 distribution. Narrowly
    # scoped to the CA cert bundle ‚Äî same reasoning as the `Unlicense`
    # allowance above.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
# Multiple versions of the same crate get a warning, not a failure ‚Äî
# duplicate transitives are common in the Rust ecosystem and we already
# allow `multiple_crate_versions` at the clippy lint level.
multiple-versions = "warn"
# Wildcard version requirements are a supply-chain footgun (one yanked
# release can break the build). Hard-deny **on external** crates;
# workspace-internal `path = "..."` deps are exempt because they are
# resolved against the local checkout, not crates.io.
wildcards = "deny"
allow-wildcard-paths = true

# Denylist: crypto-bearing crates that would compete with or shadow
# Pangolin's locked primitives. Adding any of these would re-introduce
# an FFI / unaudited path that the locked allowlist (in
# `Cargo.toml [workspace.dependencies]`) deliberately avoids.
#
# If a future plan revision needs one of these crates, the entry must
# be removed in the same PR that adds the dependency, and the plan
# must justify why the locked alternative is insufficient.
deny = [
    { name = "ring", reason = "Pangolin uses RustCrypto / dalek-cryptography crates exclusively per docs/issue-plans/P1.md; ring is FFI-laden and outside the audit surface." },
    { name = "rust-crypto", reason = "abandoned upstream; use RustCrypto org crates." },
    { name = "openssl", reason = "FFI surface; out of audit scope." },
    { name = "openssl-sys", reason = "FFI surface; out of audit scope." },
    { name = "sodiumoxide", reason = "libsodium FFI; out of audit scope." },
    { name = "libsodium-sys", reason = "libsodium FFI; out of audit scope." },
    { name = "rust-tls-bindings", reason = "FFI shim; not in scope." },
    { name = "wolfssl", reason = "FFI; not in scope." },
    { name = "boring", reason = "FFI fork of BoringSSL; not in scope." },
    # Alternative AEADs we explicitly do not ship ‚Äî re-introducing one
    # would split the audit surface.
    { name = "aes-gcm", reason = "Pangolin's AEAD is XChaCha20-Poly1305 only per the locked plan." },
    { name = "aes-gcm-siv", reason = "see aes-gcm." },
    { name = "aes-siv", reason = "see aes-gcm." },
    # Alternative signers.
    { name = "ed25519-zebra", reason = "Pangolin uses ed25519-dalek 2.x per the locked plan." },
    { name = "secp256k1", reason = "out of scope; Pangolin signs with Ed25519, not k1, until further plan revision." },
    # Alternative KDFs.
    #
    # P6 lift: `scrypt` and `pbkdf2` are removed from the deny list
    # because `tools/chaincli/` legitimately needs them ‚Äî the Foundry
    # keystore format (Web3 Secret Storage Definition v3) encrypts the
    # signing key with scrypt-then-AES-CTR, and chaincli decrypts the
    # keystore at runtime via `alloy-signer-local`'s `keystore` feature.
    # The KDF discipline for **Pangolin's own secret material** is still
    # Argon2id only ‚Äî this is enforced by the dep set of
    # `pangolin-crypto` itself (which does not pull `scrypt`/`pbkdf2`),
    # not by this banlist. `balloon-hash` remains denied because no
    # workspace path needs it.
    { name = "balloon-hash", reason = "Pangolin's KDF for its own secret material is Argon2id only per the locked plan; no workspace path needs balloon-hash." },
    # ## Reasoning ‚Äî `serde` ban (lifted in P6, scope preserved by the
    # ## `pangolin-crypto` dep set itself).
    #
    # Plan success criterion #11 (`docs/issue-plans/P1.md`) requires that
    # the secret-bearing types `VdkKey`, `AuthorityKey`, `DeviceKey` (and
    # by extension `AeadKey`, `SigningKey`, `SecretBytes`) NEVER implement
    # `serde::Serialize` or `serde::Deserialize`. P1 closed that gap at
    # the dependency-graph layer by banning `serde` workspace-wide, since
    # if `serde` and `serde_derive` are not reachable from
    # `pangolin-crypto`, no `Serialize` impl is even expressible.
    #
    # P6 lifts the workspace-wide ban because `tools/chaincli/` needs
    # `serde_json` for JSON-Lines output and `alloy` pulls in `serde` as
    # a transitive of its RPC types. The HIGH-1 protection is preserved
    # by a stricter rule: `pangolin-crypto`'s own `Cargo.toml` does not
    # name `serde` and does not depend on any crate that does. CI's
    # `cargo tree -p pangolin-crypto -i serde` returns no rows; the audit
    # checklist for security-critical crates includes that grep.
    #
    # In other words: P1's defense moved from "serde does not exist in
    # the workspace" to "serde does not reach pangolin-crypto's audit
    # surface." Both defenses are valid; the second is the one we can
    # maintain now that chain code needs RPC types.
    #
    # The chaincli surface itself is forbidden from `#[derive(Serialize,
    # Deserialize)]` on any type that carries on-chain payload bytes ‚Äî
    # see `docs/issue-plans/P6.md` Goal section + the `format.rs` /
    # `commands/dump.rs` modules, which print payloads as raw hex/base64
    # rather than parsing them through `serde`. (No CBOR decode path.)
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
