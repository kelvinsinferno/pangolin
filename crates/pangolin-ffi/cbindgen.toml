# cbindgen configuration for `pangolin-ffi`.
#
# Emits `pangolin.h` from the `extern "C"` surface in `src/cabi.rs`.
# Consumed by Tauri (and the future browser-extension native messaging
# host in MVP-4).
#
# See `docs/architecture/ffi-surface.md` for the full FFI surface
# reference; that doc is the canonical record of what is intentionally
# crossing the boundary.

language = "C"
header = """/* Generated by cbindgen — do not edit. Source: crates/pangolin-ffi/src/cabi.rs */"""
include_guard = "PANGOLIN_FFI_H"
pragma_once = true
include_version = true
braces = "SameLine"
line_length = 100
tab_width = 4
documentation = true
documentation_style = "doxy"

[parse]
parse_deps = false

[export]
# Restrict to symbols that originate in this crate's `cabi.rs` —
# transitive types from workspace deps (e.g., `pangolin-store`'s
# `Vault`) MUST NOT leak through cbindgen because they are not
# `#[repr(C)]` and have no stable layout.
include = [
    "PangolinVaultHandle",
    "PangolinErrorCode",
]

[enum]
# `PangolinErrorCode` discriminants are explicitly numbered; emit them
# verbatim. Do NOT prefix with the enum name (the variant names are
# already prefixed `PANGOLIN_*`).
prefix_with_name = false
rename_variants = "None"
