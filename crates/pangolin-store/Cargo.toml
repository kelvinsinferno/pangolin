[package]
name = "pangolin-store"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish.workspace = true
description = "Encrypted local store — SQLite + encrypted blobs. Corruption-safe writes; no plaintext at rest."

[lints]
workspace = true

[dependencies]
# Encrypted-blob crypto consumed only through pangolin-crypto's public
# API surface — this crate never invents primitives.
pangolin-crypto = { path = "../pangolin-crypto" }

rusqlite    = { workspace = true }
ciborium-ll = { workspace = true }
ciborium-io = { workspace = true }
thiserror   = { workspace = true }
zeroize     = { workspace = true }
subtle      = { workspace = true }

[dev-dependencies]
proptest = { workspace = true }
tempfile = { workspace = true }
hex      = { workspace = true }
